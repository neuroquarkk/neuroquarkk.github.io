<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default " en" }}">

<head>
    {{ partial "head.html" . }}
</head>

<body>
    <div class="layout-wrapper">

        {{ partial "header.html" . }}
        <main class="container">
            {{ block "main" . }}{{ end }}
        </main>
        {{ partial "footer.html" . }}
    </div>

    {{ $js := resources.Get "js/main.js" | resources.Minify | resources.Fingerprint }}
    <script src="{{ $js.Permalink }}" defer></script>
</body>

</html>
